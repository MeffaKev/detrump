<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      background: #1a1a1a;
      color: #f0f0f0;
    }
    .header {
      background: #111;
      padding: 14px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .body {
      padding: 16px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .label {
      font-size: 13px;
      color: #bbb;
    }
    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #e63946; }
    input:checked + .slider::before { transform: translateX(18px); }
    .status {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px;">🚫</span>
    <h1>DeTrump</h1>
  </div>
  <div class="body">
    <div class="row">
      <span class="label">Blur enabled</span>
      <label class="toggle">
        <input type="checkbox" id="toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="status" id="status">Active on this page</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
